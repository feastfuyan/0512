name: 法律报告评分
version: "2.0.0"
description: 法律/合规报告专用评分模板，含法规引用准确性和法律逻辑维度

dimensions:
  - id: thesis_clarity
    name: 论点清晰度
    name_en: Thesis Clarity
    weight: 1.0
    description: 法律意见/结论是否明确？是否存在模糊表述？
    example_question: "客户能否直接根据报告做出法律决策？"

  - id: data_anchoring
    name: 事实依据充分性
    name_en: Factual Basis
    weight: 1.2
    description: 法律分析是否基于充分的事实基础？证据材料是否完整？
    example_question: "每个法律结论是否都有对应的事实依据？"

  - id: regulation_accuracy
    name: 法规引用准确性
    name_en: Regulation Citation Accuracy
    weight: 1.5
    description: 引用的法规条款是否准确？是否为最新生效版本？引用格式是否规范？
    example_question: "引用的法条是否注明了颁布日期和生效日期？"

  - id: legal_logic
    name: 法律逻辑严密性
    name_en: Legal Logic Rigor
    weight: 1.3
    description: 法律推理是否完整（大前提-小前提-结论）？是否考虑了反对观点？
    example_question: "从法规条文到具体结论的推理是否有逻辑跳跃？"

  - id: depth_insight
    name: 深度与洞察
    name_en: Depth & Insight
    weight: 0.9
    description: 是否提供了超越法条搬运的法律洞察？风险预判是否到位？
    example_question: "报告是否指出了客户尚未意识到的法律风险？"

  - id: structural_integrity
    name: 结构完整性
    name_en: Structural Integrity
    weight: 1.0
    description: 是否按法律文书惯例组织（事实-法规-分析-结论）？
    example_question: "报告是否遵循了IRAC（Issue-Rule-Application-Conclusion）结构？"

  - id: citation_compliance
    name: 引用与合规
    name_en: Citation & Compliance
    weight: 1.5
    description: 案例引用是否标注法院和年份？是否区分了binding和persuasive authority？
    example_question: "案例引用是否包含完整的卷宗号和法院信息？"

  - id: concision
    name: 表达精炼度
    name_en: Concision
    weight: 0.8
    description: 法律用语是否准确简洁？是否避免了不必要的法律术语堆砌？
    example_question: "非法律专业读者能否理解报告的核心结论？"

  - id: contrarian_scenario
    name: 风险识别充分性
    name_en: Risk Identification
    weight: 1.1
    description: 是否全面识别了法律风险？是否提供了风险缓释建议？
    example_question: "报告是否列出了所有可能的法律风险而不仅是主要风险？"

  - id: layout_formatting
    name: 排版与格式
    name_en: Layout & Formatting
    weight: 0.5
    description: 文书格式是否规范？是否有免责声明？
    example_question: "报告是否包含标准的法律免责声明和保密声明？"

grade_scale:
  - min_score: 9.6
    grade: "A+"
    label: 顶级律所水准，可直接用于正式法律意见
  - min_score: 9.0
    grade: "A"
    label: 专业水准，法规引用准确，逻辑严密
  - min_score: 8.0
    grade: "B+"
    label: 良好，需要适度补充法条依据
  - min_score: 7.0
    grade: "B"
    label: 及格，法规引用或分析有明显不足
  - min_score: 6.0
    grade: "C"
    label: 需大幅修改，存在法律分析错误风险
  - min_score: 0
    grade: "F"
    label: 不合格，法规引用有误或逻辑缺失
