name: 矿业报告评分
version: "2.0.0"
description: 矿业行业专用评分模板，含JORC/矿权合规/地质数据可靠性维度

dimensions:
  - id: thesis_clarity
    name: 论点清晰度
    name_en: Thesis Clarity
    weight: 1.0
    description: 核心论点是否明确？矿业投资/项目评估结论是否清晰？
    example_question: "读者能否快速判断该矿业项目的投资价值？"

  - id: data_anchoring
    name: 数据支撑度
    name_en: Data Anchoring
    weight: 1.5
    description: 资源量/储量/品位/产量等关键数据是否有权威来源？JORC/NI43-101报告引用是否完整？
    example_question: "资源量声明是否有JORC/NI43-101技术报告支撑？"

  - id: logical_rigor
    name: 逻辑严密性
    name_en: Logical Rigor
    weight: 1.0
    description: 从地质数据到经济评估的推理链条是否完整？
    example_question: "从勘探数据到资源量估算的推导是否每步可追溯？"

  - id: tenement_compliance
    name: 矿权合规性
    name_en: Tenement Compliance
    weight: 1.3
    description: 矿权状态是否清晰（授予/申请/续期）？合规要求是否满足？FIRB/原住民土地权是否涉及？
    example_question: "报告是否完整披露了所有矿权的法律状态和到期日？"

  - id: geological_reliability
    name: 地质数据可靠性
    name_en: Geological Data Reliability
    weight: 1.2
    description: 采样方法、化验精度、QA/QC流程是否披露？资源估算方法是否适当？
    example_question: "钻探间距和采样密度是否足以支撑资源分类等级？"

  - id: depth_insight
    name: 深度与洞察
    name_en: Depth & Insight
    weight: 1.0
    description: 是否提供了超越公开数据的矿业分析？地质模型/开采方案是否有独特见解？
    example_question: "报告是否揭示了市场尚未充分认知的地质或运营风险？"

  - id: contrarian_scenario
    name: 反证与情景
    name_en: Contrarian & Scenario
    weight: 1.0
    description: 是否考虑了品位下降/成本超支/商品价格下跌等不利情景？
    example_question: "在商品价格下跌30%的情景下，项目的经济性如何？"

  - id: structural_integrity
    name: 结构完整性
    name_en: Structural Integrity
    weight: 1.0
    description: 报告是否按矿业报告惯例组织（地质→资源→储量→经济→风险）？
    example_question: "报告是否遵循了从地质描述到经济评估的标准矿业报告流程？"

  - id: citation_compliance
    name: 引用与合规
    name_en: Citation & Compliance
    weight: 1.3
    description: 是否标注JORC/NI43-101报告编号？是否有免责声明和胜任人声明？
    example_question: "技术数据是否可追溯到原始技术报告和胜任人签字？"

  - id: chart_quality
    name: 图表质量
    name_en: Chart Quality
    weight: 0.6
    description: 地质图/剖面图/资源量图表是否专业？比例尺/图例是否完整？
    example_question: "地质图是否有比例尺、指北针和完整图例？"

  - id: layout_formatting
    name: 排版与格式
    name_en: Layout & Formatting
    weight: 0.6
    description: 报告格式是否符合矿业报告专业标准？表格单位是否统一？
    example_question: "所有数据表格是否标注了单位和有效数字位数？"

  - id: concision
    name: 表达精炼度
    name_en: Concision
    weight: 0.7
    description: 是否避免了冗余描述？技术术语使用是否准确一致？
    example_question: "同一个地质概念是否在报告中使用了统一的术语？"

grade_scale:
  - min_score: 9.6
    grade: "A+"
    label: 投行/机构级，可直接用于投资决策
  - min_score: 9.0
    grade: "A"
    label: 专业水准，符合JORC/NI43-101报告标准
  - min_score: 8.0
    grade: "B+"
    label: 良好，需要适度修改后可用于客户交付
  - min_score: 7.0
    grade: "B"
    label: 及格，有明显信息缺失或数据不足
  - min_score: 6.0
    grade: "C"
    label: 需大幅修改，关键数据缺失
  - min_score: 0
    grade: "F"
    label: 不合格，建议重写
