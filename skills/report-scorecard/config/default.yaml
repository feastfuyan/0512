name: 默认报告评分
version: "2.0.0"
description: 通用研究报告/投资分析评分模板，10维度评估

dimensions:
  - id: thesis_clarity
    name: 论点清晰度
    name_en: Thesis Clarity
    weight: 1.0
    description: 核心论点是否明确、可证伪？读者能否一句话概括报告立场？
    example_question: "读者能否用30个字概括报告的核心论点？"

  - id: data_anchoring
    name: 数据支撑度
    name_en: Data Anchoring
    weight: 1.2
    description: 关键论断是否有数据/图表/引用支撑？数据来源是否可信？
    example_question: "每个关键论断是否都有权威数据来源支撑？"

  - id: logical_rigor
    name: 逻辑严密性
    name_en: Logical Rigor
    weight: 1.0
    description: 推理链条是否完整？是否存在逻辑跳跃或自相矛盾？
    example_question: "从数据到结论的推理链条是否每一步都站得住？"

  - id: depth_insight
    name: 深度与洞察
    name_en: Depth & Insight
    weight: 1.0
    description: 是否超越常识性描述？是否提供了非显而易见的洞察？
    example_question: "报告中是否有读者通过常识无法得出的结论？"

  - id: contrarian_scenario
    name: 反证与情景
    name_en: Contrarian & Scenario
    weight: 0.8
    description: 是否考虑了相反论据？是否有多情景分析（bull/base/bear）？
    example_question: "报告是否讨论了自身论点可能错误的情况？"

  - id: structural_integrity
    name: 结构完整性
    name_en: Structural Integrity
    weight: 1.0
    description: 是否有清晰的引言-论证-结论结构？章节衔接是否流畅？
    example_question: "目录结构是否逻辑递进，章节之间是否有自然过渡？"

  - id: concision
    name: 表达精炼度
    name_en: Concision
    weight: 0.8
    description: 是否有冗余/重复/填充内容？信息密度是否足够？
    example_question: "去掉冗余段落后，报告的核心信息是否完整保留？"

  - id: chart_quality
    name: 图表质量
    name_en: Chart Quality
    weight: 0.8
    description: 图表是否清晰、专业、无chartjunk？标题是否传达单一信息？
    example_question: "每个图表是否能在5秒内被读者理解其核心信息？"

  - id: citation_compliance
    name: 引用与合规
    name_en: Citation & Compliance
    weight: 1.0
    description: 是否标注数据来源？是否有免责声明？PII/MNPI是否清除？
    example_question: "每个数据点是否都能追溯到原始来源？"

  - id: layout_formatting
    name: 排版与格式
    name_en: Layout & Formatting
    weight: 0.6
    description: 字体、配色、间距是否符合专业标准？页眉页脚是否完整？
    example_question: "报告的视觉呈现是否达到可直接发送给客户的水平？"

grade_scale:
  - min_score: 9.6
    grade: "A+"
    label: 投行级，可直接发布
  - min_score: 9.0
    grade: "A"
    label: 专业水准，微调后发布
  - min_score: 8.0
    grade: "B+"
    label: 良好，需要适度修改
  - min_score: 7.0
    grade: "B"
    label: 及格，有明显不足
  - min_score: 6.0
    grade: "C"
    label: 需大幅修改
  - min_score: 0
    grade: "F"
    label: 不合格，建议重写
