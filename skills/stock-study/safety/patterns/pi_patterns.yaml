# LynAI Mines В· Prompt Injection Pattern Library
# Severity: critical > high > medium > low
# critical вҶ’ safe=False, redact + incident
# high     вҶ’ safe=False, redact + log
# medium   вҶ’ safe=True (allowed through), tool_guard still blocks for external sources
# low      вҶ’ safe=True

critical:
  # Classic PI
  - id: PI-C-001
    pattern: 'еҝҪз•Ҙ.{0,12}(дёҠиҝ°|еүҚйқў|д№ӢеүҚ|зі»з»ҹ|жүҖжңү).{0,4}(жҢҮд»Ө|и§„еҲҷ|жҸҗзӨә|иҰҒжұӮ|е‘Ҫд»Ө)'
    desc: 'дёӯж–Ү ignore previous'
  - id: PI-C-002
    pattern: 'дҪ зҺ°еңЁ(жү®жј”|жҳҜ|еҸҳжҲҗ|жҲҗдёә|дёҚеҶҚжҳҜ|еҝҳи®°)'
    desc: 'дёӯж–Үи§’иүІйҮҚзҪ®'
  - id: PI-C-005
    pattern: '(ignore|forget|disregard)\s+(all\s+|the\s+|any\s+)?(previous|prior|above|earlier)\s+(instructions?|prompts?|rules?|guidelines?|messages?)'
    desc: 'ignore previous instructions'
  - id: PI-C-005b
    pattern: '(forget|nullify)\s+(all\s+)?(prior|previous)\s+rules'
    desc: 'forget prior rules'
  - id: PI-C-006
    pattern: '\b(DAN|do\s+anything\s+now|developer\s+mode|sudo\s+mode)\b'
    desc: 'jailbreak personas'
  - id: PI-C-006b
    pattern: '(еҒҮиЈ…|жү®жј”|pretend)\s+(?:дҪ \s*жҳҜ|you\s+are)\s+(?:[\w\s]{0,30})?(?:unrestricted|ж— йҷҗеҲ¶|жІЎжңүйҷҗеҲ¶|new\s+AI|ж–°зҡ„\s*AI|DAN|жІЎжңүд»»дҪ•\s*restriction|жІЎжңүд»»дҪ•йҷҗеҲ¶)'
    desc: 'pretend unrestricted AI'
  - id: PI-C-006c
    pattern: 'дҪ дёҚеҶҚжҳҜ.{0,40}(?:дҪ жҳҜ|now\s+you|дҪ зҺ°еңЁ)'
    desc: 'identity replacement'
  - id: PI-C-006d
    pattern: '(?:Switch|switch)\s+to\s+(?:developer|admin|sudo|god|unrestricted)\s+mode'
    desc: 'switch mode'

  # Pseudo system / template tokens
  - id: PI-C-003
    pattern: '\[\s*(?:SYSTEM|зі»з»ҹ)[^\]]*\]'
    desc: '[SYSTEM ...] bracket'
  - id: PI-C-003b
    pattern: '<\s*\|?\s*(?:im_start|system|endoftext|user|assistant)\s*\|?\s*>'
    desc: 'chat template token'
  - id: PI-C-003c
    pattern: '(?:###|##)\s*(?:жҢҮд»Ө|Instruction|Hey\s+Claude|For\s+any\s+AI|AI\s+assistant)'
    desc: 'pseudo header injection'
  - id: PI-C-003d
    pattern: 'гҖҗ\s*AI[^гҖ‘]{0,20}гҖ‘|\[\s*HIDDEN\s*\]|\[\s*For\s+any\s+AI[^\]]*\]'
    desc: 'AI-targeted bracket aside'
  - id: PI-C-003e
    pattern: '(?:Hey|еҳҝ)\s*Claude|AI\s+assistant\s*[:пјҡ]|Note\s+to\s+(?:the\s+)?AI'
    desc: 'direct model-name addressing'
  - id: PI-C-003f
    pattern: 'AI\s+еҠ©жүӢ|з»ҷ\s*AI\s*(?:зңӢзҡ„|зҡ„)?\s*(?:жҢҮд»Ө|ж¶ҲжҒҜ|жҸҗзӨә)'
    desc: 'дёӯж–Ү AI еҠ©жүӢ aside'

  # Bypass safety/compliance
  - id: PI-C-004
    pattern: '(и·іиҝҮ|з»•иҝҮ|е…ій—ӯ|зҰҒз”Ё|еҸ–ж¶Ҳ|еҝҪз•Ҙ).{0,10}(еҗҲи§„|е®үе…Ё|е®Ўж ё|жЈҖжҹҘ|иҝҮж»Ө|йЈҺйҷ©\s*жҸҗзӨә)'
    desc: 'bypass compliance Chinese'
  - id: PI-C-007
    pattern: '(disregard|override|forget|nullify|ignore|bypass|skip)\s+(?:[\w\s]{0,20})?(?:safety|rules?|policy|guidelines?|filters?|compliance|checks?|restrictions?)'
    desc: 'bypass English'
  - id: PI-C-007b
    pattern: '\b(?:override|skip|и·іиҝҮ|з»•иҝҮ)\s+(?:еҗҲи§„|safety|compliance|safety[-\s]?check|жЈҖжҹҘ)'
    desc: 'mixed-language override'
  - id: PI-C-007c
    pattern: '\boverride\s+(?:еҗҲи§„|compliance|safety|safety[-\s]?check)'
    desc: 'english+chinese override compliance'

  # Reveal prompts / creds
  - id: PI-C-010
    pattern: '(reveal|print|show|display|dump|leak|tell)\s+(?:me\s+)?(?:[\w\s]{0,12})?(?:your\s+)?(?:system\s+)?(prompt|instructions?|rules?|persona)'
    desc: 'reveal system prompt EN'
  - id: PI-C-010b
    pattern: '(жү“еҚ°|иҫ“еҮә|еұ•зӨә|е‘ҠиҜүжҲ‘|еұ•зӨәдёҖдёӢ).{0,8}(зі»з»ҹжҸҗзӨә|зі»з»ҹжҢҮд»Ө|дҪ зҡ„жҢҮд»Ө|дҪ зҡ„жҸҗзӨә|prompt|зі»з»ҹж¶ҲжҒҜ)'
    desc: 'reveal system prompt ZH'
  - id: PI-C-010c
    pattern: '(?:иҜ·\s*)?(?:еұ•зӨә|зңӢзңӢ|з»ҷжҲ‘зңӢ)\s*(?:дҪ зҡ„\s*)?(?:system[\s_]?prompt|зі»з»ҹжҸҗзӨә|жҢҮд»Ө)'
    desc: 'reveal CN variant'
  - id: PI-C-011
    pattern: '\b(API[\s_-]?KEY|access[_\s]?token|secret[_\s]?key|password|еҮӯиҜҒ)\b'
    desc: 'credential sensitive terms'
  - id: PI-C-011b
    pattern: '(?:print|reveal|show|dump|tell|е‘ҠиҜүжҲ‘)\s+.{0,12}(?:API[\s_-]?KEY|password|token|secret)'
    desc: 'extract credentials'

  # Forced trading label / promises
  - id: PI-C-100
    pattern: '(force|ејәеҲ¶|еҝ…йЎ»|дёҖе®ҡ).{0,15}(label|иҫ“еҮә|ж Үи®°|иҜ„дёә|rating|grade).{0,12}(вҶ‘|вҶ“|еӨҡеӨҙ|з©әеӨҙ|long|short|buy|sell|BUY|SELL)'
    desc: 'forced trading label'
  - id: PI-C-100b
    pattern: '\bforce[_\s]?label\s*[=:]\s*(?:вҶ‘|вҶ“|еӨҡеӨҙ|з©әеӨҙ|long|short|BUY|SELL|guaranteed_buy|вҶ‘еӨҡеӨҙ|вҶ“з©әеӨҙ)'
    desc: 'force_label= assignment'
  - id: PI-C-101
    pattern: '(guaranteed[_\s-]?(?:buy|return|profit|gain)|дҝқиҜҒж”¶зӣҠ|еҝ…ж¶Ё|еҝ…и·Ң|зЁіиөҡ|еҢ…иөҡ|ж— йЈҺйҷ©|risk[_\s-]?free|зЁіиөў)'
    desc: 'performance promise'
  - id: PI-C-102
    pattern: '(?:жҠҠ|set|change|update|ејәеҲ¶|force).{0,20}(target_price|target|зӣ®ж Үд»·|risk_score)\s*[=:дёә]\s*[0-9.]+'
    desc: 'forcibly set numeric field'
  - id: PI-C-103
    pattern: '(?:rate|ж Үи®°|ејәеҲ¶)\s+(?:everything|all|жҜҸ[еҸӘдёӘ]|е…ЁйғЁ|жүҖжңү)\s+(?:as\s+)?(?:bullish|buy|вҶ‘еӨҡеӨҙ|guaranteed)'
    desc: 'rate all bullish'

high:
  - id: PI-H-003
    pattern: '(?:no\s+matter\s+what|regardless\s+of)\s*[,пјҢ]?\s*(output|return|rate|set|label|force|emit)'
    desc: 'unconditional output EN'
  - id: PI-H-003b
    pattern: '(?:дёҚз®Ў|дёҚи®ә|ж— и®әеҰӮдҪ•).{0,12}(иҫ“еҮә|з»ҷеҮә|еҸ‘еёғ|иҜ„|ж Ү)'
    desc: 'unconditional output ZH'

medium:
  - id: PI-M-001
    pattern: '(reveal|print|show|tell)\s+(?:me\s+)?(?:your\s+)?(name|version|model)'
    desc: 'introspection'
  - id: PI-M-003
    pattern: '(pretend|еҒҮиЈ…|еҒҮи®ҫ)\s+(you|дҪ )\s+(are|is|жҳҜ)\b'
    desc: 'generic role-play'

# Unicode anomalies вҖ” scanned before NFKC
unicode_red_flags:
  - id: U-001
    pattern: '[\u200b-\u200f\ufeff]'
    desc: 'zero-width chars'
    severity: critical
  - id: U-002
    pattern: '[\u202a-\u202e]'
    desc: 'BiDi control chars'
    severity: critical
  - id: U-003
    pattern: '[\U000E0020-\U000E007E]'
    desc: 'Unicode tag chars'
    severity: critical
  - id: U-004
    pattern: '[\uFF01-\uFF5E]{15,}'
    desc: 'long fullwidth ASCII run'
    severity: high
